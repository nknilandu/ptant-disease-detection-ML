<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Disease Classification</title>

    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/jquery.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/newjs.js') }}"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #071126, #0f1f3d, #0f766e);
            color: #ffffff;
        }

        .navbar {
            background: rgba(5, 15, 35, 0.88) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 18px rgba(0,0,0,0.25);
            padding: 14px 0;
        }

        .navbar-brand {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffffff !important;
        }

        .nav-link {
            color: #dbeafe !important;
            font-weight: 500;
            margin-left: 12px;
        }

        .nav-link:hover {
            color: #86efac !important;
        }

        .hero-section {
            padding: 80px 20px 50px;
        }

        .hero-box {
            max-width: 1200px;
            margin: auto;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 30px;
            align-items: center;
        }

        .hero-left h1 {
            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 18px;
        }

        .hero-left p {
            font-size: 1.08rem;
            color: #dbeafe;
            max-width: 650px;
            margin-bottom: 26px;
        }

        .hero-btns a {
            display: inline-block;
            text-decoration: none;
            padding: 12px 22px;
            border-radius: 12px;
            font-weight: 700;
            margin-right: 12px;
            margin-bottom: 10px;
            transition: 0.3s ease;
        }

        .btn-main {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
        }

        .btn-main:hover {
            transform: translateY(-2px);
            color: white;
            text-decoration: none;
        }

        .btn-alt {
            border: 1px solid rgba(255,255,255,0.22);
            color: white;
            background: rgba(255,255,255,0.08);
        }

        .btn-alt:hover {
            transform: translateY(-2px);
            color: white;
            text-decoration: none;
        }

        .hero-right {
            display: flex;
            justify-content: center;
        }

        .plant-banner {
            width: 100%;
            max-width: 420px;
            min-height: 350px;
            border-radius: 28px;
            background:
                linear-gradient(rgba(10,20,40,0.25), rgba(10,20,40,0.25)),
                url('https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?auto=format&fit=crop&w=900&q=80');
            background-size: cover;
            background-position: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.12);
        }

        .section-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 14px;
        }

        .section-subtitle {
            text-align: center;
            color: #dbeafe;
            max-width: 760px;
            margin: 0 auto 35px;
            font-size: 1rem;
        }

        .features-section,
        .predict-section,
        .about-section {
            padding: 30px 20px 70px;
        }

        .features-grid {
            max-width: 1200px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
        }

        .feature-card,
        .about-card,
        .predict-card {
            background: rgba(255,255,255,0.10);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 24px;
            box-shadow: 0 18px 50px rgba(0,0,0,0.22);
            backdrop-filter: blur(12px);
        }

        .feature-card {
            padding: 28px 24px;
            text-align: center;
        }

        .feature-icon {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .feature-card h3 {
            font-size: 1.25rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .feature-card p {
            color: #dbeafe;
            font-size: 0.97rem;
            line-height: 1.6;
        }

        .predict-wrapper {
            max-width: 760px;
            margin: auto;
        }

        .predict-card {
            padding: 38px 30px;
            text-align: center;
        }

        .predict-card h2 {
            font-size: 2.4rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .predict-card p {
            color: #dbeafe;
            margin-bottom: 22px;
        }

        .upload-box {
            padding: 22px;
            border: 2px dashed rgba(255,255,255,0.20);
            border-radius: 18px;
            background: rgba(255,255,255,0.06);
            margin-bottom: 24px;
        }

        #imageUpload {
            color: white;
            font-size: 15px;
        }

        #imagePreview {
            width: 100%;
            max-width: 320px;
            height: 320px;
            object-fit: cover;
            border-radius: 20px;
            margin-top: 20px;
            border: 3px solid rgba(255,255,255,0.14);
            box-shadow: 0 12px 32px rgba(0,0,0,0.28);
        }

        #btn-predict {
            margin-top: 22px;
            padding: 13px 30px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #06b6d4, #2563eb);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(37,99,235,0.32);
            transition: 0.3s ease;
        }

        #btn-predict:hover {
            transform: translateY(-2px);
        }

        .loader {
            margin: 28px auto 18px;
            border: 6px solid rgba(255,255,255,0.14);
            border-top: 6px solid #38bdf8;
            border-radius: 50%;
            width: 58px;
            height: 58px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #result {
            margin-top: 24px;
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
            padding: 16px 20px;
            border-radius: 18px;
            background: rgba(255,255,255,0.08);
            display: inline-block;
            min-width: 280px;
        }

        .about-wrapper {
            max-width: 1100px;
            margin: auto;
        }

        .about-card {
            padding: 35px 30px;
        }

        .about-card h3 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .about-card p {
            color: #dbeafe;
            line-height: 1.8;
            font-size: 1rem;
            margin-bottom: 14px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.10);
            color: #cbd5e1;
            font-size: 0.95rem;
            background: rgba(3,10,25,0.45);
        }

        @media (max-width: 991px) {
            .hero-box {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .hero-left p {
                margin-left: auto;
                margin-right: auto;
            }

            .hero-left h1 {
                font-size: 2.5rem;
            }

            .features-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 576px) {
            .hero-left h1 {
                font-size: 2rem;
            }

            .predict-card h2 {
                font-size: 1.8rem;
            }

            #result {
                font-size: 1.5rem;
                min-width: auto;
                width: 100%;
            }

            .predict-card,
            .about-card,
            .feature-card {
                padding: 24px 18px;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">🌿 Plant Disease Classification</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ml-auto">
                    <a class="nav-link" href="#home">Home</a>
                    <a class="nav-link" href="#predict">Predict</a>
                    <a class="nav-link" href="#about">About</a>
                </div>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <div class="footer">
        © 2026 Plant Disease Classification System | Deep Learning Based Detection
    </div>
</body>
</html>
